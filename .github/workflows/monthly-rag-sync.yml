name: Monthly RAG & Bilgipaketi Sync

on:
  schedule:
    - cron: '0 23 1 * *' # Her ayın 1'i, Türkiye 02:00
  workflow_dispatch:
    inputs:
      run_bilgipaketi:
        description: 'Bilgipaketi API sync (Script 5)'
        type: boolean
        default: true
      run_crawl:
        description: 'Subdomain crawl + RAG (Script 6) — 3 paralel parça'
        type: boolean
        default: true
      run_crawl_1:
        description: 'Sadece Crawl Parça 1/3'
        type: boolean
        default: false
      run_crawl_2:
        description: 'Sadece Crawl Parça 2/3'
        type: boolean
        default: false
      run_crawl_3:
        description: 'Sadece Crawl Parça 3/3'
        type: boolean
        default: false
      run_vectorize:
        description: 'Bilgipaketi vektörizasyon (Script 7) + Eksik embedding doldur (Script 8)'
        type: boolean
        default: true
      run_fill_only:
        description: 'SADECE eksik embeddingleri doldur (Script 8)'
        type: boolean
        default: false

jobs:
  # --- JOB 1: Bilgipaketi API Sync (Script 5) ---
  bilgipaketi-sync:
    if: ${{ github.event_name == 'schedule' || inputs.run_bilgipaketi == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Bilgipaketi API Sync (Script 5)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BILGIPAKETI_TOKEN: ${{ secrets.BILGIPAKETI_TOKEN }}
        run: node 5_sync_bilgipaketi.js

  # --- JOB 2a: Subdomain Crawl Parça 1/3 ---
  crawl-part-1:
    if: ${{ github.event_name == 'schedule' || inputs.run_crawl == true || inputs.run_crawl_1 == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Subdomain Crawl Parça 1/3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRAWL_PART: '1'
          CRAWL_TOTAL: '3'
        run: node 6_crawl_subdomains.js

  # --- JOB 2b: Subdomain Crawl Parça 2/3 ---
  crawl-part-2:
    if: ${{ github.event_name == 'schedule' || inputs.run_crawl == true || inputs.run_crawl_2 == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Subdomain Crawl Parça 2/3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRAWL_PART: '2'
          CRAWL_TOTAL: '3'
        run: node 6_crawl_subdomains.js

  # --- JOB 2c: Subdomain Crawl Parça 3/3 ---
  crawl-part-3:
    if: ${{ github.event_name == 'schedule' || inputs.run_crawl == true || inputs.run_crawl_3 == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Subdomain Crawl Parça 3/3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRAWL_PART: '3'
          CRAWL_TOTAL: '3'
        run: node 6_crawl_subdomains.js

  # --- JOB 3: Bilgipaketi Vektörizasyon (Script 7) + Embedding Doldur (Script 8) ---
  vectorize:
    needs: [bilgipaketi-sync, crawl-part-1, crawl-part-2, crawl-part-3]
    if: always() && (github.event_name == 'schedule' || inputs.run_vectorize == true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Bilgipaketi Vektörizasyon (Script 7)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node 7_vectorize_bilgipaketi.js
      - name: Eksik Embeddingleri Doldur (Script 8 - Batch)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node 8_fill_embeddings.js

  # --- JOB 4: JSON Export + R2 Upload (Bilgipaketi sonrası) ---
  export-json:
    needs: [vectorize]
    if: always() && (github.event_name == 'schedule' || inputs.run_bilgipaketi == true || inputs.run_vectorize == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Supabase → JSON Export
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node sync_supabase.js
      - name: Git Commit JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "🔄 Monthly sync: JSON export after bilgipaketi"
          git pull --rebase origin main || true
          git push
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          for f in data/*.json; do
            filename=$(basename "$f")
            aws s3 cp "$f" "s3://${R2_BUCKET}/data/${filename}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type "application/json" 2>/dev/null || echo "⚠️ R2 upload skipped: $filename"
          done

  # --- JOB 5: SADECE Script 8 (Eksik embedding doldur) ---
  fill-embeddings-only:
    if: ${{ inputs.run_fill_only == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Eksik Embeddingleri Doldur (Script 8 - Batch)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node 8_fill_embeddings.js
