name: Daily Data Sync & Purge

on:
  schedule:
    - cron: '0 23 * * *' # Türkiye saatiyle 02:00
  workflow_dispatch:
    inputs:
      run_scrapers:
        description: 'Scraperları çalıştır (Üniversite sitelerinden veri çek)'
        type: boolean
        default: true
      run_sync:
        description: 'Supabase → JSON + R2 (Veriyi JSON yap ve R2ye at)'
        type: boolean
        default: true

jobs:
  # --- 1. ADIM: BOTLARI ÇALIŞTIR (Hızlı/Paralel) ---
  run-scrapers:
    if: ${{ github.event_name == 'schedule' || inputs.run_scrapers == true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        script: [
          "1_sync_classrooms.js",
          "2_sync_academics.js",
          "3_sync_courses.js",
          "4_sync_sessions.js",
          "calendar_scraper.js",
          "scraper.js"
        ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - name: Run ${{ matrix.script }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node ${{ matrix.script }}

  # --- 2. ADIM: JSON YAP VE PUSHLA ---
  sync-json:
    needs: run-scrapers
    if: always() && (github.event_name == 'schedule' || inputs.run_sync == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - name: Supabase -> JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node sync_supabase.js
      - name: Push to GitHub
        run: |
          git config --global user.name 'Enginar Bot'
          git config --global user.email 'bot@enginar.app'
          git add data/*.json
          git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: $(date +'%Y-%m-%d')" && git push)
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          for file in data/*.json; do
            aws s3 cp "$file" "s3://${{ secrets.R2_BUCKET_NAME }}/data/$(basename $file)" \
              --content-type "application/json" \
              --cache-control "public, max-age=300"
          done
      - name: Purge jsdelivr CDN (yedek)
        run: |
          FILES=("versions.json" "pins.json" "types.json" "classes.json" "offices.json" "foods.json" "polygons.json" "widgets.json" "stops.json" "routes.json" "exams.json" "academic_calendar.json" "academics.json" "courses.json" "sessions.json" "classrooms.json")
          for file in "${FILES[@]}"; do
            curl -s -I "https://purge.jsdelivr.net/gh/${{ github.repository }}/data/$file" > /dev/null
          done
