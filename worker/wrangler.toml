name = "enginar-chat"
main = "index.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

# KV Namespace — Rate Limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "bec44ef710ce40cf82451717d093021e"

# Secrets (wrangler secret put ile eklenir):
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# GEMINI_API_KEY        — Embedding + Query fix + LLM son fallback
# GROQ_API_KEY          — Birincil LLM (Llama 3.3 70B)
# CEREBRAS_API_KEY      — İkincil LLM (Llama 3.3 70B)
# SAMBANOVA_API_KEY     — Üçüncül LLM (Llama 3.3 70B)
# TOGETHER_API_KEY      — Dördüncül LLM (Llama 3.3 70B Turbo)
# COHERE_API_KEY        — Query fix yedek (Command R)
# JINA_API_KEY          — Embedding yedek (jina-embeddings-v2, 768d)

# Custom domain (Cloudflare Dashboard'dan ayarlanır)
# routes = [{ pattern = "api.kovan.myenginar.org/chat*", zone_name = "myenginar.org" }]
